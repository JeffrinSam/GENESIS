name: Lint & Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install linting tools
        run: pip install black flake8 isort

      - name: black format check
        run: black --check --line-length 100 part1_generation/ part2_navigation/ part2_manipulation/ simulator/ scripts/ --exclude="__pycache__|\.venv|\.git"

      - name: flake8 lint
        run: flake8 part1_generation/ part2_navigation/ part2_manipulation/ simulator/ --max-line-length=100 --extend-ignore=E203,W503 --exclude=__pycache__,.venv,.git

      - name: isort import check
        run: isort --check-only --line-length 100 part1_generation/ part2_navigation/ part2_manipulation/ simulator/

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install minimal dependencies
        run: |
          pip install numpy pillow opencv-python-headless tqdm pyyaml requests

      - name: Smoke-import check (no GPU, no checkpoints)
        run: |
          python -c "import pathlib; [compile(open(p).read(), p, 'exec') for p in pathlib.Path('.').rglob('*.py') if '.venv' not in str(p) and '__pycache__' not in str(p)]"
        continue-on-error: true
